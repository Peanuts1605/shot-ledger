name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e '.[dev,real]'
      - name: Install Worker dependencies
        run: npm ci
      - name: Verify Python
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .
          .venv/bin/pytest -q
          .venv/bin/pip check
      - name: Verify Worker
        run: npm run check:worker
